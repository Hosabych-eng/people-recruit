<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PeopleRecruit Importer</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0f172a;
        --card: #1e293b;
        --border: #334155;
        --text: #f8fafc;
        --muted: #94a3b8;
        --primary: #4f46e5;
        --primary-hover: #4338ca;
        --success: #10b981;
        --warning: #f59e0b;
        --danger: #ef4444;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        width: 360px;
        min-height: 420px;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background: linear-gradient(180deg, #111827 0%, var(--bg) 100%);
        color: var(--text);
      }

      .shell {
        padding: 16px;
      }

      .header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 16px;
      }

      .logo {
        width: 36px;
        height: 36px;
        border-radius: 10px;
        background: linear-gradient(135deg, #6366f1, #312e81);
        display: grid;
        place-items: center;
        font-weight: 700;
        font-size: 14px;
        letter-spacing: -0.02em;
      }

      .title {
        margin: 0;
        font-size: 15px;
        font-weight: 600;
      }

      .subtitle {
        margin: 2px 0 0;
        font-size: 12px;
        color: var(--muted);
      }

      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 14px;
      }

      label {
        display: block;
        margin-bottom: 6px;
        font-size: 12px;
        font-weight: 500;
        color: var(--muted);
      }

      select {
        width: 100%;
        margin-bottom: 12px;
        padding: 10px 12px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: #0b1220;
        color: var(--text);
        font-size: 13px;
        outline: none;
      }

      select:focus,
      input[type="email"]:focus,
      input[type="text"]:focus {
        border-color: #6366f1;
        box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
      }

      input[type="email"],
      input[type="text"] {
        width: 100%;
        margin-bottom: 12px;
        padding: 10px 12px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: #0b1220;
        color: var(--text);
        font-size: 13px;
        outline: none;
      }

      input[type="email"]::placeholder,
      input[type="text"]::placeholder {
        color: #64748b;
      }

      .preview {
        margin-bottom: 12px;
        padding: 10px 12px;
        border-radius: 8px;
        background: #0b1220;
        border: 1px dashed var(--border);
        font-size: 12px;
        line-height: 1.5;
        color: var(--muted);
        min-height: 72px;
      }

      .preview strong {
        color: var(--text);
      }

      button {
        width: 100%;
        border: none;
        border-radius: 8px;
        padding: 11px 14px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        background: var(--primary);
        color: white;
        transition: background 0.15s ease;
      }

      button:hover:not(:disabled) {
        background: var(--primary-hover);
      }

      button:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }

      .status {
        margin-top: 12px;
        padding: 10px 12px;
        border-radius: 8px;
        font-size: 12px;
        line-height: 1.5;
        display: none;
      }

      .status.visible {
        display: block;
      }

      .status.info {
        background: rgba(99, 102, 241, 0.12);
        border: 1px solid rgba(99, 102, 241, 0.35);
        color: #c7d2fe;
      }

      .status.success {
        background: rgba(16, 185, 129, 0.12);
        border: 1px solid rgba(16, 185, 129, 0.35);
        color: #6ee7b7;
      }

      .status.warning {
        background: rgba(245, 158, 11, 0.12);
        border: 1px solid rgba(245, 158, 11, 0.35);
        color: #fcd34d;
      }

      .status.error {
        background: rgba(239, 68, 68, 0.12);
        border: 1px solid rgba(239, 68, 68, 0.35);
        color: #fca5a5;
      }

      .status a {
        color: inherit;
        font-weight: 600;
      }

      .footer {
        margin-top: 12px;
        font-size: 11px;
        color: var(--muted);
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <header class="header">
        <div class="logo" aria-hidden="true">PR</div>
        <div>
          <h1 class="title">PeopleRecruit</h1>
          <p class="subtitle">Import from LinkedIn or Djinni</p>
        </div>
      </header>

      <section class="card">
        <label for="job-select">Target vacancy</label>
        <select id="job-select" disabled>
          <option value="">Loading vacancies…</option>
        </select>

        <label for="name-input">Name</label>
        <input
          id="name-input"
          type="text"
          placeholder="Candidate name from profile"
          autocomplete="name"
        />

        <label for="email-input">Email (optional)</label>
        <input
          id="email-input"
          type="email"
          placeholder="Add email manually if not found on page"
          autocomplete="email"
        />

        <div id="preview" class="preview">
          Open a LinkedIn or Djinni candidate profile, then click import.
        </div>

        <button id="import-btn" type="button" disabled>Import Candidate to CRM</button>

        <div id="status" class="status" role="status" aria-live="polite"></div>
      </section>

      <p class="footer">Log into CRM at localhost:3000 before importing.</p>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
