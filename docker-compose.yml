services:
  postgres:
    image: postgres:16-alpine
    container_name: people-recruit-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: recruit
      POSTGRES_PASSWORD: recruit_dev
      POSTGRES_DB: people_recruit
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recruit -d people_recruit"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
